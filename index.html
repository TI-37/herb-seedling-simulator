<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#7c5cbf" />
  <!-- アプリ表示（ブラウザ感を減らす：ホーム画面追加時にフルスクリーン化） -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ハーブ苗" />
  <title>ハーブ苗 収益シミュ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>🌱 <span id="plantName">ラベンダー</span> 収益シミュ</h1>
  </header>

  <main class="layout">
    <!-- ============ 上：計算結果サマリー（入力項目の上に配置） ============ -->
    <section class="panel summary-panel">
      <h2>計算結果（メイン試算）</h2>

      <!-- 主要指標 -->
      <h3 class="subhead">💰 主要指標</h3>
      <div class="kpi-row">
        <div class="kpi">
          <span class="kpi-label">粗利益</span>
          <span class="kpi-value" id="kpiProfit">-</span>
        </div>
        <div class="kpi">
          <span class="kpi-label">1本あたり</span>
          <span class="kpi-value" id="kpiProfitPerUnit">-</span>
        </div>
      </div>

      <!-- 仕入れ・準備の目安（販売本数に連動して自動計算） -->
      <h3 class="subhead">📦 仕入れ・準備の目安</h3>
      <div class="qty-grid" id="qtyGrid"><!-- JSで生成 --></div>
    </section>

    <!-- ============ 左：入力フォーム ============ -->
    <section class="panel input-panel">
      <div class="panel-head">
        <h2>入力項目</h2>
        <button type="button" id="toggleAll" class="toggle-all">すべて開く/閉じる</button>
      </div>

      <!-- 販売チャネル（常時表示。あとからBASE/楽天/Amazon等を追加しやすい構造） -->
      <div class="field channel-field">
        <label for="channel">販売チャネル</label>
        <select id="channel"></select>
      </div>

      <!-- 入力項目（親トグル：以下のセクションをまとめて開閉） -->
      <details class="input-collapse" open>
        <summary>入力項目を開く / 閉じる</summary>
        <div class="parent-body">

      <!-- 売上の前提 -->
      <details class="group" open>
        <summary>売上の前提</summary>
        <div class="group-body">
          <div class="field">
            <label for="unitsSold">販売本数</label>
            <input type="number" id="unitsSold" min="0" step="1" value="60" />
            <span class="unit">本</span>
          </div>
          <div class="field">
            <label for="price">単価</label>
            <input type="number" id="price" min="0" step="10" value="800" />
            <span class="unit">円</span>
          </div>
          <div class="field">
            <label for="commissionRate">販売手数料率</label>
            <input type="number" id="commissionRate" min="0" max="100" step="0.1" value="10" />
            <span class="unit">％</span>
          </div>
          <div class="field">
            <label for="lossRate">不良率・ロス率</label>
            <input type="number" id="lossRate" min="0" max="99" step="0.5" value="0" />
            <span class="unit">％</span>
          </div>
        </div>
      </details>

      <!-- セット販売の前提 -->
      <details class="group" open>
        <summary>セット販売の前提</summary>
        <div class="group-body">
          <div class="field">
            <label for="setSize">セット本数</label>
            <input type="number" id="setSize" min="1" step="1" value="5" />
            <span class="unit">本／セット</span>
          </div>
          <div class="field">
            <label for="setDiscount">セット割引率</label>
            <input type="number" id="setDiscount" min="0" max="100" step="0.5" value="0" />
            <span class="unit">％</span>
          </div>
          <p class="hint">下の比較表（3本・5本セット）の割引率は個別に設定できます。</p>
          <div class="field">
            <label for="disc3">3本セット割引率</label>
            <input type="number" id="disc3" min="0" max="100" step="0.5" value="5" />
            <span class="unit">％</span>
          </div>
          <div class="field">
            <label for="disc5">5本セット割引率</label>
            <input type="number" id="disc5" min="0" max="100" step="0.5" value="10" />
            <span class="unit">％</span>
          </div>
        </div>
      </details>

      <!-- 資材費 -->
      <details class="group">
        <summary>資材費（仕入れ単位で入力）</summary>
        <div class="group-body">
          <div class="field two">
            <label>種代</label>
            <div class="pair">
              <input type="number" id="seedPackPrice" min="0" step="1" value="370" />
              <span class="unit">円 ÷</span>
              <input type="number" id="seedPackQty" min="1" step="1" value="60" />
              <span class="unit">粒</span>
            </div>
          </div>
          <div class="field two">
            <label>ポット代</label>
            <div class="pair">
              <input type="number" id="potPackPrice" min="0" step="1" value="388" />
              <span class="unit">円 ÷</span>
              <input type="number" id="potPackQty" min="1" step="1" value="10" />
              <span class="unit">個</span>
            </div>
          </div>
          <div class="field two">
            <label>培土代</label>
            <div class="pair">
              <input type="number" id="soilPrice" min="0" step="1" value="1740" />
              <span class="unit">円 ÷</span>
              <input type="number" id="soilVolume" min="0.1" step="0.1" value="6" />
              <span class="unit">L</span>
            </div>
          </div>
          <div class="field">
            <label for="soilPerPot">培土使用量</label>
            <input type="number" id="soilPerPot" min="0" step="0.05" value="0.2" />
            <span class="unit">L／ポット</span>
          </div>
        </div>
      </details>

      <!-- 発送費 -->
      <details class="group">
        <summary>発送費</summary>
        <div class="group-body">
          <div class="field">
            <label for="boxPrice">梱包代</label>
            <input type="number" id="boxPrice" min="0" step="1" value="30" />
            <span class="unit">円／箱</span>
          </div>
          <div class="field">
            <label for="shippingPrice">送料</label>
            <input type="number" id="shippingPrice" min="0" step="10" value="940" />
            <span class="unit">円／発送</span>
          </div>
          <div class="field two">
            <label for="shipments">発送回数</label>
            <div class="pair">
              <input type="number" id="shipments" min="0" step="1" value="12" />
              <span class="unit">回</span>
              <label class="check"><input type="checkbox" id="shipAuto" checked /> 販売本数から自動</label>
            </div>
          </div>
          <div class="field">
            <label for="otherCost">その他経費</label>
            <input type="number" id="otherCost" min="0" step="100" value="0" />
            <span class="unit">円</span>
          </div>
        </div>
      </details>

        </div><!-- /.parent-body -->
      </details><!-- /入力項目 親トグル -->

      <button type="button" id="resetBtn" class="reset-btn">初期値に戻す</button>
    </section>

    <!-- ============ 右：計算結果 ============ -->
    <section class="panel result-panel">
      <h2>内訳・比較</h2>

      <!-- 経費の内訳バー -->
      <h3 class="subhead">📊 経費の内訳</h3>
      <div class="cost-bar" id="costBar"><!-- JSで生成 --></div>
      <div class="cost-legend" id="costLegend"><!-- JSで生成 --></div>

      <!-- 明細（グループ化） -->
      <h3 class="subhead">🧾 内訳明細</h3>
      <table class="result-table" id="resultTable">
        <tbody><!-- JSで生成 --></tbody>
      </table>

      <!-- セット比較 -->
      <h2>セット本数 比較表</h2>
      <table class="result-table compare-table" id="compareTable">
        <thead><!-- JSで生成 --></thead>
        <tbody><!-- JSで生成 --></tbody>
      </table>
    </section>
  </main>

  <!-- 画面下部に常時表示するタブ（品目切り替え。中身はJSで生成） -->
  <nav class="tabbar" id="tabbar"><!-- JSで生成 --></nav>

  <script src="script.js"></script>
</body>
</html>
